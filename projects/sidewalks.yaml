project_name: sidewalks

root_dir: ../root

plugins_dir:
- ../.installed_plugins
- ../plugins

sync:
  schedule: "daily"

pipes:

- connector: "plugin:greenville-county"
  metric: "sidewalks"
  parameters:
    schema: "Sidewalks"
    target: "county_sidewalks"
    greenville-county:
      layer: "Sidewalk"
    dtypes:
      geometry: "geometry[LINESTRING, 6570]"
    indices:
      geometry: "geometry"

- connector: "sql:bwg"
  metric: "streets"
  location: "with-sidewalks"
  parameters:
    schema: "Sidewalks"
    target: "streets_with_sidewalks"
    columns:
      primary: "id"
      street_name: "ST_LABEL"
    dtypes:
      id: "int"
      geometry: "geometry[MULTILINESTRING, 3361]"
    indices:
      geometry: "geometry"
    sql: |-
      WITH greenville AS (
        SELECT ST_Transform("geometry", 3361) AS "geometry"
        FROM "Boundaries"."boundaries_greenville"
      )
      SELECT
        streets."id",
        streets."ST_LABEL",
        ST_CollectionExtract(
          ST_Intersection(ST_Multi(streets."geometry"), greenville."geometry"),
          2
        )::geometry(MULTILINESTRING, 3361) AS "geometry"
      FROM city."Streets" AS streets
      JOIN greenville
        ON ST_Intersects(streets."geometry", greenville."geometry")
      WHERE (
        SELECT COALESCE(SUM(ST_Length(ST_Intersection(sidewalks."geometry", ST_Buffer(streets."geometry", 50)))), 0)
        FROM city."Sidewalks" AS sidewalks
        WHERE ST_DWithin(streets."geometry", sidewalks."geometry", 50)
      ) >= 0.25 * ST_Length(streets."geometry")

config:
  meerschaum:
    instance: sql:bwg
    connectors:
      sql:
        bwg: MRSM{meerschaum:connectors:sql:bwg}
  plugins:
    bwg:
      data_path: '{MRSM_ROOT_DIR}/../data'

environment: {}
