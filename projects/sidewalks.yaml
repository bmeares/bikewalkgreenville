### See https://meerschaum.io/reference/compose/ for the compose schema.

project_name: sidewalks

root_dir: ../root

plugins_dir:
- ../.installed_plugins
- ../plugins

sync:
  schedule: "daily"

pipes:

- connector: "sql:bwg"
  metric: "city_financial_report"
  location: "sidewalks_vs_streets"
  parameters:
    schema: "Sidewalks"
    target: "{{self.location}}"
    columns:
      primary: "year"
    dtypes:
      year: "int"
    sql: |-
      SELECT "year", "miles_of_streets", "miles_of_sidewalks"
      FROM "Parking".parking_inventory_greenville

- connector: "sql:bwg"
  metric: "sidewalks"
  location: "greenville"
  parameters:
    schema: "Sidewalks"
    target: "{{self.metric}}"
    columns:
      primary: "id"
    dtypes:
      id: "int"
      geometry: "geometry[polygon,3361]"
    sql: |-
      SELECT id, "MATERIAL", "WIDTH", "SIDE_OF_ST", "STREET_NAM", ST_Buffer(geometry, "WIDTH"::FLOAT/2.0) as "geometry"
      FROM "city"."Sidewalks"


config:
  meerschaum:
    instance: sql:bwg
    connectors:
      sql:
        bwg: MRSM{meerschaum:connectors:sql:bwg}
  plugins:
    bwg:
      data_path: '{MRSM_ROOT_DIR}/../data'

environment: {}
