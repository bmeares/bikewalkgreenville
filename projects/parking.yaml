### See https://meerschaum.io/reference/compose/ for the compose schema.

project_name: parking

root_dir: ../root

plugins_dir:
- ../.installed_plugins
- ../plugins

sync:
  schedule: "daily"

pipes:

- connector: "sql:bwg"
  metric: "parking"
  location: "county"
  parameters:
    schema: "Parking"
    target: "parking_county"
    columns:
      primary: "GlobalID"
    sql: |-
      SELECT
        CASE
          WHEN "FEAT_CODE" = 880 THEN 'Paved parking'
          WHEN "FEAT_CODE" = 881 THEN 'Un-paved parking'
          WHEN "FEAT_CODE" = 882 THEN 'Not a parking polygon'
        END AS "polygon_type",
        "GlobalID",
        "SHAPE_STAr" AS "shape_area",
        "SHAPE_STLe" AS "shape_length",
        "geometry"
      FROM county."PLN_PARKING"
      WHERE "FEAT_CODE" != 882

- connector: "sql:bwg"
  metric: "parking"
  location: "city"
  parameters:
    schema: "Parking"
    target: parking_city
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[3361]"
    sql: |-
      SELECT *,
        CASE 
          WHEN "FEAT_CODE" = 121 THEN 'Paved'
          WHEN "FEAT_CODE" = 122 THEN 'Unpaved'
          WHEN "FEAT_CODE" = 123 THEN 'Background'
          WHEN "FEAT_CODE" = 124 THEN 'Residential Driveway'
          WHEN "FEAT_CODE" = 127 THEN 'Under Construction'
          ELSE 'Unknown'
        END AS "type"
      FROM city."Parking"

- connector: "sql:bwg"
  metric: "parking"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_parking"
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[polygon, 3361]"
      id: "int"
    indices:
      geometry: "geometry"
      feat_code: "FEAT_CODE"
    sql: |-
      SELECT p.*
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN "city"."Parking" AS p
        ON ST_Intersects(ST_MakeValid(dt.geom), ST_MakeValid(p.geometry))

- connector: "sql:bwg"
  metric: "pavement"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_pavement"
    autoincrement: true
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[multipolygon, 3361]"
      id: "int"
    indices:
      geometry: "geometry"
    sql: |-
      SELECT 
          ST_Intersection(p.geometry, ST_MakeValid(dt.geom)) AS geometry,
          row_number() OVER () AS id
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN (
        SELECT ST_Subdivide(ST_MakeValid(geometry)) AS geometry
        FROM "city"."EdgeOfPavement"
      ) AS p
      ON ST_Intersects(ST_Buffer(ST_MakeValid(dt.geom), 20), p.geometry)
      WHERE NOT ST_IsEmpty(ST_Intersection(p.geometry, dt.geom))

- connector: "plugin:city-gis"
  metric: "parking"
  location: "garages"
  parameters:
    schema: "Parking"
    target: "parking_garages"
    columns:
      datetime: "ts"
      id: "id"
    autotime: true
    precision: "minute"

- connector: "sql:bwg"
  metric: "roads"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_roads"
    columns:
      primary: "Facility ID"
    dtypes:
      geometry: "geometry[LINESTRING,3361]"
    indices:
      geometry: geometry
    sql: |-
      SELECT 
          r."Facility ID",
          ST_Intersection(
              ST_Transform(ST_MakeValid(r.geometry), 3361), 
              ST_Buffer(ST_MakeValid(dt.geom), 20)
          ) AS geometry
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN "Roads"."roads" AS r
        ON ST_Intersects(
            ST_Transform(r.geometry, 3361), 
            ST_Buffer(dt.geom, 20)
        )

- connector: "plugin:parking"
  metric: "requirements"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_requirements_greenville"
    columns:
      category: "category"
      type: "type"
  
- connector: "plugin:parking"
  metric: "inventory"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_inventory_greenville"
    columns:
      year: "year"

- connector: "sql:bwg"
  metric: "car_infrastructure_ratios"
  location: "downtown"
  parameters:
    columns:
      primary: "id"
    schema: "Parking"
    target: "{{ self.metric }}"
    sql: |
      WITH parking_lots AS (
        SELECT ST_Union(ST_MakeValid(geometry)) AS geom 
        FROM "Parking".dtmp_parking
      ), facilities AS (
        SELECT ST_Union(ST_MakeValid(geometry)) AS geom 
        FROM "Parking".parking_facilities_greenville
      ), pavement_cleaned AS (
        SELECT ST_Difference(
          ST_Union(ST_MakeValid(pave.geometry)), 
          (SELECT geom FROM parking_lots)
        ) AS geom
        FROM "Parking".dtmp_pavement pave
      ), total_infra AS (
        SELECT ST_Union(ARRAY[
          (SELECT geom FROM parking_lots),
          (SELECT geom FROM facilities),
          (SELECT geom FROM pavement_cleaned)
        ]) AS geom
      )
      SELECT
        1 AS "id",
        'Other Downtown' AS "name",
        ST_Area(dt.geom) - ST_Area(i.geom) AS "total_area"
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" dt, total_infra i
      UNION ALL
      SELECT
        2 AS "id",
        'Parking Lots' AS "name",
        ST_Area(geom) AS "total_area"
      FROM parking_lots
      UNION ALL
      SELECT
        3 AS "id",
        'Roadway Pavement' AS "name",
        ST_Area(geom) AS "total_area"
      FROM pavement_cleaned
      UNION ALL
      SELECT
        4 AS "id",
        'Parking Facilities' AS "name",
        ST_Area(geom) AS "total_area"
      FROM facilities

- connector: "plugin:parking"
  metric: "inventory"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_inventory_greenville"
    columns:
      year: "year"

- connector: "sql:bwg"
  metric: "parking_facilities"
  location: "greenville"
  parameters:
    schema: "Parking"
    reference:
      connector: "plugin:city-gis"
      metric: "BuildingFootprints"
    target: "{{ self.metric }}_{{ self.location }}"
    sql: |-
      SELECT b.*
      FROM "city"."BuildingFootprints" AS b
      JOIN "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS d
        ON ST_Intersects(ST_MakeValid(d."geom"), ST_MakeValid(b."geometry"))
      WHERE "FEATCODE" = 25

- connector: "sql:bwg"
  metric: "public_garages"
  location: "downtown"
  parameters:
    reference:
      connector: "sql:bwg"
      metric: "parking_facilities"
      location: "greenville"
    target: "{{ self.metric }}_{{ self.location }}"
    sql: |-
      SELECT b.*
      FROM "city"."BuildingFootprints" AS b
      WHERE "id" IN (
        12707, 4589, 21099, 4150, 4004,
        7759, 2969, 2693, 2841, 2906
      )

- connector: "sql:bwg"
  metric: "private_garages"
  location: "downtown"
  parameters:
    reference:
      connector: "sql:bwg"
      metric: "parking_facilities"
      location: "greenville"
    target: "{{ self.metric }}_{{ self.location }}"
    sql: |-
      SELECT *
      FROM {{ Pipe('sql:bwg', 'parking_facilities', 'greenville') }}
      WHERE "id" NOT IN (SELECT "id" FROM {{ Pipe('sql:bwg', 'public_garages', 'downtown') }})

- connector: "sql:bwg"
  metric: "parking_types"
  location: "counts"
  parameters:
    schema: "Parking"
    target: "parking_types_counts"
    columns:
      primary: "id"
    sql: |-
      WITH parking_spaces AS (
        SELECT public_parking_spaces
        FROM "Parking".parking_inventory_greenville
        WHERE "year" = 2025
      ), garage_capacity AS (
        SELECT SUM(capacity) AS garage_spaces
        FROM "Parking".parking_garages
        WHERE ts = (
          SELECT MAX(ts) FROM "Parking".parking_garages
        )
      )
      SELECT
        1 AS "id",
        garage_spaces AS "Garage",
        ((public_parking_spaces - garage_spaces) - 800) AS "Surface",
        800 AS "Street"
      FROM garage_capacity
      INNER JOIN parking_spaces ON 1 = 1

- connector: "sql:bwg"
  metric: "cross_reference"
  location: "identifiers"
  parameters:
    schema: "Parking"
    target: "parking_garages_cross_reference"
    columns:
      db_id: "db_id"
      api_id: "api_id"
    sql: |-
      SELECT *
      FROM (
        VALUES
        (2693, 884),
        (2841, 883),
        (2906, 780),
        (2969, 887),
        (4004, 889),
        (4150, 886),
        (4589, 888)
      ) AS t ("db_id", "api_id")

- connector: "sql:bwg"
  metric: "garages_counts"
  location: "map"
  parameters:
    schema: "Parking"
    target: "garages_counts_map"
    columns:
      datetime: "ts"
      api_id: "api_id"
      db_id: "db_id"
    dtypes:
      geometry: "geometry[POLYGON, 3361]"
    indices:
      name: "name"
      label: "label"
      geometry: "geometry"
    upsert: true
    null_indices: false
    mixed_numerics: false
    static: true
    fetch:
      backtrack_minutes: 0
      definition: |-
        SELECT
          g."capacity",
          g."occupied",
          (
            CASE
              WHEN g."occupied" < g."capacity" THEN g."occupied"
              WHEN g."occupied" >= g."capacity" THEN g."capacity"
            END
          )::FLOAT / g."capacity" AS "Percent Occupied",
          CASE
            WHEN g."occupied" < g."capacity" THEN g."occupied"
            WHEN g."occupied" >= g."capacity" THEN g."capacity"
          END AS "Spaces Occupied",
          g."name",
          g."ts",
          x.db_id,
          x.api_id,
          SMART_CAPITALIZE(f."FAC_LABEL") AS "label",
          f."HEIGHT" AS "height",
          f."geometry"
        FROM "Parking".parking_garages AS g
        INNER JOIN "Parking".parking_garages_cross_reference AS x
          ON x.api_id = g.id
        INNER JOIN "Parking".parking_facilities_greenville AS f
          ON f.id = x.db_id

config:
  meerschaum:
    instance: sql:bwg
    connectors:
      sql:
        bwg: MRSM{meerschaum:connectors:sql:bwg}
  plugins:
    bwg:
      data_path: '{MRSM_ROOT_DIR}/../data'

environment: {}
