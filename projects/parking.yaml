### See https://meerschaum.io/reference/compose/ for the compose schema.

project_name: parking

root_dir: ../root

plugins_dir:
- ../.installed_plugins
- ../plugins

sync:
  schedule: "daily"

pipes:

- connector: "sql:bwg"
  metric: "parking"
  location: "county"
  parameters:
    schema: "Parking"
    target: "parking_county"
    columns:
      primary: "GlobalID"
    sql: |-
      SELECT
        CASE
          WHEN "FEAT_CODE" = 880 THEN 'Paved parking'
          WHEN "FEAT_CODE" = 881 THEN 'Un-paved parking'
          WHEN "FEAT_CODE" = 882 THEN 'Not a parking polygon'
        END AS "polygon_type",
        "GlobalID",
        "SHAPE_STAr" AS "shape_area",
        "SHAPE_STLe" AS "shape_length",
        "geometry"
      FROM county."PLN_PARKING"
      WHERE "FEAT_CODE" != 882

- connector: "sql:bwg"
  metric: "parking"
  location: "city"
  parameters:
    schema: "Parking"
    target: parking_city
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[3361]"
    sql: |-
      SELECT *,
        CASE 
          WHEN "FEAT_CODE" = 121 THEN 'Paved'
          WHEN "FEAT_CODE" = 122 THEN 'Unpaved'
          WHEN "FEAT_CODE" = 123 THEN 'Background'
          WHEN "FEAT_CODE" = 124 THEN 'Residential Driveway'
          WHEN "FEAT_CODE" = 127 THEN 'Under Construction'
          ELSE 'Unknown'
        END AS "type"
      FROM city."Parking"

- connector: "sql:bwg"
  metric: "parking"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_parking"
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[polygon, 3361]"
      id: "int"
    indices:
      geometry: "geometry"
      feat_code: "FEAT_CODE"
    sql: |-
      SELECT p.*
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN "city"."Parking" AS p
        ON ST_Intersects(ST_MakeValid(dt.geom), ST_MakeValid(p.geometry))

- connector: "sql:bwg"
  metric: "pavement"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_pavement"
    autoincrement: true
    columns:
      primary: "id"
    dtypes:
      geometry: "geometry[multipolygon, 3361]"
      id: "int"
    indices:
      geometry: "geometry"
    sql: |-
      SELECT 
          ST_Intersection(p.geometry, ST_MakeValid(dt.geom)) AS geometry,
          row_number() OVER () AS id
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN (
        SELECT ST_Subdivide(ST_MakeValid(geometry)) AS geometry
        FROM "city"."EdgeOfPavement"
      ) AS p
      ON ST_Intersects(ST_Buffer(ST_MakeValid(dt.geom), 20), p.geometry)
      WHERE NOT ST_IsEmpty(ST_Intersection(p.geometry, dt.geom))

- connector: "plugin:city-gis"
  metric: "parking"
  location: "garages"
  parameters:
    schema: "Parking"
    target: "parking_garages"
    columns:
      datetime: "ts"
      id: "id"
    autotime: true
    precision: "minute"

- connector: "sql:bwg"
  metric: "roads"
  location: "dtmp"
  parameters:
    schema: "Parking"
    target: "dtmp_roads"
    columns:
      primary: "Facility ID"
    dtypes:
      geometry: "geometry[LINESTRING,3361]"
    indices:
      geometry: geometry
    sql: |-
      SELECT 
          r."Facility ID",
          ST_Intersection(
              ST_Transform(ST_MakeValid(r.geometry), 3361), 
              ST_Buffer(ST_MakeValid(dt.geom), 20)
          ) AS geometry
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS dt
      JOIN "Roads"."roads" AS r
        ON ST_Intersects(
            ST_Transform(r.geometry, 3361), 
            ST_Buffer(dt.geom, 20)
        )

- connector: "plugin:parking"
  metric: "requirements"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_requirements_greenville"
    columns:
      category: "category"
      type: "type"
  
- connector: "plugin:parking"
  metric: "inventory"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_inventory_greenville"
    columns:
      year: "year"

- connector: "sql:bwg"
  metric: "car_infrastructure_ratios"
  location: "downtown"
  parameters:
    columns:
      primary: "id"
    schema: "Parking"
    target: "{{ self.metric }}"
    sql: |
      WITH parking_lots AS (
        SELECT ST_Union(ST_MakeValid(geometry)) AS geom 
        FROM "Parking".dtmp_parking
      ), facilities AS (
        SELECT ST_Union(ST_MakeValid(geometry)) AS geom 
        FROM "Parking".parking_facilities_greenville
      ), pavement_cleaned AS (
        SELECT ST_Difference(
          ST_Union(ST_MakeValid(pave.geometry)), 
          (SELECT geom FROM parking_lots)
        ) AS geom
        FROM "Parking".dtmp_pavement pave
      ), total_infra AS (
        SELECT ST_Union(ARRAY[
          (SELECT geom FROM parking_lots),
          (SELECT geom FROM facilities),
          (SELECT geom FROM pavement_cleaned)
        ]) AS geom
      )
      SELECT
        1 AS "id",
        'Other Downtown' AS "name",
        ST_Area(dt.geom) - ST_Area(i.geom) AS "total_area"
      FROM "Boundaries"."DTMP_STUDYAREA_2019_POLY" dt, total_infra i
      UNION ALL
      SELECT
        2 AS "id",
        'Parking Lots' AS "name",
        ST_Area(geom) AS "total_area"
      FROM parking_lots
      UNION ALL
      SELECT
        3 AS "id",
        'Roadway Pavement' AS "name",
        ST_Area(geom) AS "total_area"
      FROM pavement_cleaned
      UNION ALL
      SELECT
        4 AS "id",
        'Parking Facilities' AS "name",
        ST_Area(geom) AS "total_area"
      FROM facilities

- connector: "plugin:parking"
  metric: "inventory"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_inventory_greenville"
    columns:
      year: "year"

- connector: "sql:bwg"
  metric: "parking_facilities"
  location: "greenville"
  parameters:
    schema: "Parking"
    target: "parking_facilities_greenville"
    columns:
      primary: "id"
    dtypes:
      id: "int8"
      height: "int8"
      geometry: "geometry[POLYGON, 3361]"
    indices:
      geometry: "geometry"
    sql: |-
      SELECT b.*
      FROM "city"."BuildingFootprints" AS b
      JOIN "Boundaries"."DTMP_STUDYAREA_2019_POLY" AS d
        ON ST_Intersects(ST_MakeValid(d."geom"), ST_MakeValid(b."geometry"))
      WHERE "FEATCODE" = 25

- connector: "sql:bwg"
  metric: "public_garages"
  location: "downtown"
  parameters:
    schema: "Parking"
    target: "public_garages_downtown"
    columns:
      primary: "id"
    dtypes:
      id: "int8"
      height: "int8"
      geometry: "geometry[POLYGON, 3361]"
    indices:
      geometry: "geometry"
    sql: |-
      SELECT b.*
      FROM "city"."BuildingFootprints" AS b
      WHERE "id" IN (
        12707, 4589, 21099, 4150, 4004,
        7759, 2969, 2693, 2841, 2906
      )


config:
  meerschaum:
    instance: sql:bwg
    connectors:
      sql:
        bwg: MRSM{meerschaum:connectors:sql:bwg}
  plugins:
    bwg:
      data_path: '{MRSM_ROOT_DIR}/../data'

environment: {}
